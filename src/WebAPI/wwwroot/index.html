<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #eee; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .container { width: 100%; max-width: 800px; height: 95vh; display: flex; flex-direction: column; background: #1e1e2e; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #313244; }

        /* Login */
        #login-section { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; }
        .login-card { width: 100%; max-width: 360px; }
        .login-card h2 { margin-bottom: 8px; color: #cdd6f4; font-size: 28px; text-align: center; }
        .login-card p { margin-bottom: 28px; color: #6c7086; font-size: 14px; text-align: center; }
        .login-card input { width: 100%; padding: 14px 18px; margin-bottom: 14px; border: 1px solid #313244; border-radius: 10px; background: #181825; color: #cdd6f4; font-size: 14px; outline: none; transition: border 0.2s; }
        .login-card input:focus { border-color: #89b4fa; }
        .login-card button { width: 100%; padding: 14px; background: linear-gradient(135deg, #89b4fa, #74c7ec); color: #1e1e2e; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
        .login-card button:hover { transform: translateY(-1px); }
        .login-card button:active { transform: translateY(0); }
        #login-error { color: #f38ba8; margin-top: 12px; font-size: 13px; text-align: center; }

        /* Chat */
        #chat-section { display: none; flex-direction: column; height: 100%; }
        .chat-header { padding: 18px 24px; background: #181825; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #313244; }
        .chat-header h3 { color: #cdd6f4; font-size: 18px; font-weight: 600; }
        .chat-header button { background: none; border: 1px solid #45475a; color: #a6adc8; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .chat-header button:hover { border-color: #f38ba8; color: #f38ba8; }

        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

        .msg-wrapper { display: flex; gap: 10px; }
        .msg-wrapper.user { flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
        .msg-wrapper.bot .msg-avatar { background: #313244; }
        .msg-wrapper.user .msg-avatar { background: #89b4fa; color: #1e1e2e; }

        .msg { max-width: 85%; padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.7; word-wrap: break-word; }
        .msg-wrapper.user .msg { background: #89b4fa; color: #1e1e2e; border-bottom-right-radius: 4px; }
        .msg-wrapper.bot .msg { background: #313244; color: #cdd6f4; border-bottom-left-radius: 4px; }

        /* Markdown rendering in bot messages */
        .msg-wrapper.bot .msg h1, .msg-wrapper.bot .msg h2, .msg-wrapper.bot .msg h3 { color: #89b4fa; margin: 16px 0 8px 0; font-weight: 700; }
        .msg-wrapper.bot .msg h1 { font-size: 20px; }
        .msg-wrapper.bot .msg h2 { font-size: 17px; }
        .msg-wrapper.bot .msg h3 { font-size: 15px; color: #74c7ec; }
        .msg-wrapper.bot .msg p { margin: 8px 0; }
        .msg-wrapper.bot .msg ul, .msg-wrapper.bot .msg ol { margin: 8px 0 8px 20px; }
        .msg-wrapper.bot .msg li { margin: 4px 0; }
        .msg-wrapper.bot .msg strong { color: #f9e2af; }
        .msg-wrapper.bot .msg em { color: #a6e3a1; }
        .msg-wrapper.bot .msg code { background: #1e1e2e; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', 'Consolas', monospace; font-size: 13px; color: #f38ba8; }
        .msg-wrapper.bot .msg pre { background: #11111b; border-radius: 10px; padding: 16px; margin: 12px 0; overflow-x: auto; border: 1px solid #45475a; position: relative; }
        .msg-wrapper.bot .msg pre code { background: none; padding: 0; color: #cdd6f4; display: block; font-size: 13px; line-height: 1.6; }
        .msg-wrapper.bot .msg blockquote { border-left: 3px solid #89b4fa; padding-left: 14px; margin: 10px 0; color: #a6adc8; font-style: italic; }
        .msg-wrapper.bot .msg hr { border: none; border-top: 1px solid #45475a; margin: 14px 0; }
        .msg-wrapper.bot .msg table { border-collapse: collapse; margin: 10px 0; width: 100%; }
        .msg-wrapper.bot .msg th, .msg-wrapper.bot .msg td { border: 1px solid #45475a; padding: 8px 12px; text-align: left; }
        .msg-wrapper.bot .msg th { background: #1e1e2e; color: #89b4fa; }

        .typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
        .typing-dots span { width: 8px; height: 8px; background: #6c7086; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        .chat-input { display: flex; padding: 16px 20px; background: #181825; gap: 10px; border-top: 1px solid #313244; }
        .chat-input input { flex: 1; padding: 14px 18px; border: 1px solid #313244; border-radius: 10px; background: #1e1e2e; color: #cdd6f4; font-size: 14px; outline: none; transition: border 0.2s; }
        .chat-input input:focus { border-color: #89b4fa; }
        .chat-input button { padding: 14px 24px; background: linear-gradient(135deg, #89b4fa, #74c7ec); color: #1e1e2e; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        .chat-input button:hover { transform: translateY(-1px); }
        .chat-input button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Copy button for code blocks */
        .code-block-wrapper { position: relative; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #45475a; border: none; color: #cdd6f4; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
        .code-block-wrapper:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #585b70; }
        .copy-btn.copied { background: #a6e3a1; color: #1e1e2e; }

        @media (max-width: 600px) {
            .container { height: 100vh; border-radius: 0; max-width: 100%; }
            .msg { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="login-section">
            <div class="login-card">
                <h2>🤖 ChatBot</h2>
                <p>Enter your client credentials to start chatting</p>
                <input type="text" id="clientId" placeholder="Client ID" value="Client1">
                <input type="password" id="secret" placeholder="Secret" value="Client@1234">
                <button onclick="login()">Connect & Start Chat</button>
                <div id="login-error"></div>
            </div>
        </div>

        <!-- Chat -->
        <div id="chat-section">
            <div class="chat-header">
                <h3>🤖 ChatBot</h3>
                <button onclick="logout()">✕ Logout</button>
            </div>
            <div class="messages" id="messages"></div>
            <div class="chat-input">
                <input type="text" id="msgInput" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let token = '';

        // Configure marked for proper rendering
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        async function login() {
            const clientId = document.getElementById('clientId').value;
            const secret = document.getElementById('secret').value;
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';

            try {
                const res = await fetch(`${API}/api/Token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, secret })
                });

                if (!res.ok) {
                    const err = await res.json();
                    errorEl.textContent = err.error || 'Invalid credentials';
                    return;
                }

                const data = await res.json();
                token = data.token;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                addBotMessage('Hello! 👋 How can I help you today? Ask me anything.');
            } catch (e) {
                errorEl.textContent = 'Connection failed. Is the server running?';
            }
        }

        function logout() {
            token = '';
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('chat-section').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if (!msg) return;

            input.value = '';
            addUserMessage(msg);

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            input.disabled = true;
            const typingEl = showTyping();

            try {
                const res = await fetch(`${API}/api/Chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message: msg })
                });

                typingEl.remove();

                if (res.ok) {
                    const data = await res.json();
                    addBotMessage(data.reply);
                } else if (res.status === 401) {
                    addBotMessage('⚠️ Session expired. Please logout and login again.');
                } else {
                    addBotMessage('⚠️ Something went wrong. Please try again.');
                }
            } catch (e) {
                typingEl.remove();
                addBotMessage('⚠️ Connection error. Please check if the server is running.');
            }

            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper user';
            wrapper.innerHTML = `
                <div class="msg-avatar">You</div>
                <div class="msg">${escapeHtml(text)}</div>
            `;
            appendMessage(wrapper);
        }

        function addBotMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper bot';

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = renderMarkdown(text);

            wrapper.innerHTML = `<div class="msg-avatar">🤖</div>`;
            wrapper.appendChild(msgDiv);
            appendMessage(wrapper);

            // Add copy buttons to code blocks
            msgDiv.querySelectorAll('pre').forEach(pre => {
                const wrapperDiv = document.createElement('div');
                wrapperDiv.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapperDiv, pre);
                wrapperDiv.appendChild(pre);

                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copy';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(pre.textContent);
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
                };
                wrapperDiv.appendChild(copyBtn);
            });
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper bot';
            wrapper.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            appendMessage(wrapper);
            return wrapper;
        }

        function appendMessage(el) {
            const container = document.getElementById('messages');
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
        }

        function renderMarkdown(text) {
            return marked.parse(text);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
